# Vault Autosync -- the safety net that keeps every change converging on main.
#
# Claude sessions are instructed (CLAUDE.md "Git Autopilot") to push straight
# to main. This workflow catches everything that slips through anyway:
#   - a session that pushed only to its designated claude/* working branch
#   - a session that opened a pull request despite instructions
#   - a branch left behind by a session that died mid-run
#
# It merges every non-main branch into main (Markdown union-merges via
# .gitattributes; anything else conflicting resolves in favor of the branch,
# which carries the newer work), pushes main, and deletes the merged branch.
# Deleting a merged branch also closes any pull request opened from it, so
# the user never has to look at a PR.
#
# Runs on every side-branch push, when a PR is opened, and as an hourly sweep.
# Installed by /onboard at: .github/workflows/vault-autosync.yml

name: Vault Autosync

on:
  push:
    branches-ignore: [main]
  pull_request:
    types: [opened, reopened]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so two near-simultaneous session pushes don't race each other.
concurrency:
  group: vault-autosync
  cancel-in-progress: false

jobs:
  autosync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # GITHUB_TOKEN cannot push changes to .github/workflows/* (GitHub blocks
          # self-modifying workflows at the API level, regardless of permissions).
          # Set a VAULT_AUTOSYNC_TOKEN secret (PAT or App token with the workflow
          # permission) if sessions need to edit workflow files; otherwise those
          # branches are skipped and left in place, and everything else still merges.
          token: ${{ secrets.VAULT_AUTOSYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Merge every side branch into main
        run: |
          set -e
          git config user.name "vault-autosync"
          git config user.email "vault-autosync@users.noreply.github.com"

          # Finish a merge that has conflicts: union handles .md files via
          # .gitattributes; for everything else keep the branch side (newer).
          resolve_and_commit() {
            git checkout --theirs . 2>/dev/null || true
            git add -A
            git commit --no-edit
          }

          # 0 = pushed. 2 = blocked because the merge touches .github/workflows/*
          # and our token lacks the workflow permission (retrying cannot help).
          # 1 = anything else we could not resolve in three attempts.
          push_main() {
            local out
            # main may move under us if a session pushes mid-run; re-merge and retry.
            for attempt in 1 2 3; do
              if out=$(git push origin main 2>&1); then return 0; fi
              echo "$out"
              if echo "$out" | grep -qiE 'refusing to allow|workflows? (permission|scope)'; then
                return 2
              fi
              git fetch origin main
              git merge --no-edit -X theirs origin/main || resolve_and_commit
            done
            return 1
          }

          git fetch origin --prune

          hard_fail=0

          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin \
                       | grep -v -E '^origin/(main|HEAD)$'); do
            branch="${ref#origin/}"

            # Branch already fully in main? Just clean it up.
            if git merge-base --is-ancestor "$ref" HEAD; then
              git push origin --delete "$branch" || true
              continue
            fi

            echo "Merging $branch into main"
            git merge --no-ff --no-edit -X theirs "$ref" || resolve_and_commit

            rc=0
            push_main || rc=$?

            if [ "$rc" -eq 0 ]; then
              git push origin --delete "$branch" || true
              continue
            fi

            # This branch could not land. Drop the local merge so it cannot ride
            # along on the next branch's push, keep the branch alive, and carry on
            # with the rest -- one bad branch must not block the whole vault.
            git fetch origin main
            git reset --hard origin/main

            if [ "$rc" -eq 2 ]; then
              echo "::warning::Skipped '$branch': it changes .github/workflows/*, which GITHUB_TOKEN is not allowed to push. Add a VAULT_AUTOSYNC_TOKEN repository secret (a PAT or App token with the workflow permission) to let autosync merge it."
            else
              hard_fail=1
              echo "::error::Skipped '$branch': could not push main after 3 attempts."
            fi
          done

          if [ "$hard_fail" -eq 1 ]; then
            echo "Vault converged on main, except for the branches flagged above."
            exit 1
          fi

          echo "Vault is converged on main."
